<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Queue — What's Next?</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #14161C; }
  * { box-sizing: border-box; }
  button { font-family: inherit; cursor: pointer; }
  input { font-family: inherit; }
  ::selection { background: #4FD1C5; color: #14161C; }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  @keyframes pulse { from { opacity: 1; } to { opacity: 0.3; } }
  #boot-error { display:none; color:#FF9A90; font-family: monospace; padding: 20px; white-space: pre-wrap; }
</style>
</head>
<body>
<div id="root"></div>
<div id="boot-error"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

<script>
window.addEventListener("error", function (e) {
  var box = document.getElementById("boot-error");
  box.style.display = "block";
  box.textContent = "Something failed to load:\n" + (e.message || e);
});
</script>

<script>
(function () {
  if (typeof React === "undefined" || typeof ReactDOM === "undefined") {
    var box = document.getElementById("boot-error");
    box.style.display = "block";
    box.textContent = "React failed to load from the CDN. Check your internet connection and refresh.";
    return;
  }

  var h = React.createElement;
  var useState = React.useState;
  var useEffect = React.useEffect;
  var useRef = React.useRef;

  var CATEGORIES = [
    { key: "watching", label: "Watching", num: "01", color: "#F2C94C" },
    { key: "havent_watched", label: "Haven't Watched", num: "02", color: "#4FA8E0" },
    { key: "watch_later", label: "Watch Later", num: "03", color: "#F2994A" },
    { key: "up_to_date", label: "Up to Date", num: "04", color: "#27AE60" },
    { key: "finished", label: "Finished", num: "05", color: "#9B59B6" },
    { key: "stopped_watching", label: "Stopped Watching", num: "06", color: "#EB5757" }
  ];

  var STORAGE_KEY = "signal-tv-tracker-shows-v1";
  var TVMAZE = "https://api.tvmaze.com";

  function svgIcon(paths, size) {
    size = size || 16;
    return h("svg", { width: size, height: size, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: "2" }, paths);
  }
  var Icons = {
    search: function (size) { return svgIcon([h("circle", { key: 1, cx: 11, cy: 11, r: 7 }), h("line", { key: 2, x1: 21, y1: 21, x2: 16.65, y2: 16.65 })], size); },
    plus: function (size) { return svgIcon([h("line", { key: 1, x1: 12, y1: 5, x2: 12, y2: 19 }), h("line", { key: 2, x1: 5, y1: 12, x2: 19, y2: 12 })], size); },
    x: function (size) { return svgIcon([h("line", { key: 1, x1: 18, y1: 6, x2: 6, y2: 18 }), h("line", { key: 2, x1: 6, y1: 6, x2: 18, y2: 18 })], size); },
    tv: function (size) { return svgIcon([h("rect", { key: 1, x: 2, y: 7, width: 20, height: 14, rx: 2 }), h("polyline", { key: 2, points: "17 2 12 7 7 2" })], size); },
    refresh: function (size) { return svgIcon([h("polyline", { key: 1, points: "23 4 23 10 17 10" }), h("polyline", { key: 2, points: "1 20 1 14 7 14" }), h("path", { key: 3, d: "M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15" })], size); },
    chevron: function (size) { return svgIcon([h("polyline", { key: 1, points: "6 9 12 15 18 9" })], size || 13); },
    check: function (size) { return svgIcon([h("polyline", { key: 1, points: "20 6 9 17 4 12" })], size || 13); },
    download: function (size) { return svgIcon([h("path", { key: 1, d: "M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" }), h("polyline", { key: 2, points: "7 10 12 15 17 10" }), h("line", { key: 3, x1: 12, y1: 15, x2: 12, y2: 3 })], size); },
    upload: function (size) { return svgIcon([h("path", { key: 1, d: "M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" }), h("polyline", { key: 2, points: "17 8 12 3 7 8" }), h("line", { key: 3, x1: 12, y1: 3, x2: 12, y2: 15 })], size); }
  };

  function deriveAutoStatus(show, watchedIds, eps) {
    if (!eps || eps.length === 0) return show.status;
    var today = new Date().toISOString().slice(0, 10);
    var aired = eps.filter(function (e) { return e.airdate && e.airdate <= today; });
    if (aired.length === 0) return "havent_watched";
    var watchedCount = aired.filter(function (e) { return watchedIds.indexOf(e.id) !== -1; }).length;
    if (watchedCount === 0) return "havent_watched";
    if (watchedCount < aired.length) return "watching";
    var ended = show.showStatus === "Ended" || show.showStatus === "Canceled" || show.showStatus === "Cancelled";
    return ended ? "finished" : "up_to_date";
  }

  function useDebounce(value, delay) {
    var state = useState(value);
    var debounced = state[0], setDebounced = state[1];
    useEffect(function () {
      var t = setTimeout(function () { setDebounced(value); }, delay);
      return function () { clearTimeout(t); };
    }, [value, delay]);
    return debounced;
  }

  function fmtDate(d) {
    if (!d) return null;
    try {
      var date = new Date(d);
      return date.toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" });
    } catch (e) { return null; }
  }

  // Only keep the fields the app actually reads. TVmaze's raw episode objects
  // include a full HTML summary, images, runtime, ratings, and API links that
  // are never used here, and they're what was blowing past the localStorage quota.
  function trimEpisode(e) {
    return { id: e.id, season: e.season, number: e.number, name: e.name, airdate: e.airdate };
  }
  function trimEpisodesCache(cache) {
    var next = {};
    Object.keys(cache || {}).forEach(function (tvmazeId) {
      next[tvmazeId] = (cache[tvmazeId] || []).map(trimEpisode);
    });
    return next;
  }

  function App() {
    var showsState = useState([]);
    var shows = showsState[0], setShows = showsState[1];
    var loadedState = useState(false);
    var loaded = loadedState[0], setLoaded = loadedState[1];
    var activeTabState = useState("watching");
    var activeTab = activeTabState[0], setActiveTab = activeTabState[1];
    var searchOpenState = useState(false);
    var searchOpen = searchOpenState[0], setSearchOpen = searchOpenState[1];
    var queryState = useState("");
    var query = queryState[0], setQuery = queryState[1];
    var debouncedQuery = useDebounce(query, 350);
    var searchResultsState = useState([]);
    var searchResults = searchResultsState[0], setSearchResults = searchResultsState[1];
    var searchingState = useState(false);
    var searching = searchingState[0], setSearching = searchingState[1];
    var refreshingState = useState(false);
    var refreshing = refreshingState[0], setRefreshing = refreshingState[1];
    var errorState = useState(null);
    var error = errorState[0], setError = errorState[1];
    var menuOpenForState = useState(null);
    var menuOpenFor = menuOpenForState[0], setMenuOpenFor = menuOpenForState[1];
    var detailShowIdState = useState(null);
    var detailShowId = detailShowIdState[0], setDetailShowId = detailShowIdState[1];
    var episodesCacheState = useState({});
    var episodesCache = episodesCacheState[0], setEpisodesCache = episodesCacheState[1];
    var episodesLoadingState = useState(false);
    var episodesLoading = episodesLoadingState[0], setEpisodesLoading = episodesLoadingState[1];
    var expandedSeasonsState = useState({});
    var expandedSeasons = expandedSeasonsState[0], setExpandedSeasons = expandedSeasonsState[1];
    var fileInputRef = useRef(null);

    useEffect(function () {
      try {
        var rawShows = localStorage.getItem(STORAGE_KEY);
        if (rawShows) setShows(JSON.parse(rawShows));
        
        var rawCache = localStorage.getItem(STORAGE_KEY + "-cache");
        if (rawCache) setEpisodesCache(trimEpisodesCache(JSON.parse(rawCache)));
      } catch (e) {}
      setLoaded(true);
    }, []);

    useEffect(function () {
      if (!loaded) return;
      try { 
        localStorage.setItem(STORAGE_KEY, JSON.stringify(shows)); 
        localStorage.setItem(STORAGE_KEY + "-cache", JSON.stringify(episodesCache));
      }
      catch (e) {
        console.error("Queue: failed to save to localStorage", e);
        var reason = (e && (e.name || e.message)) ? (e.name || e.message) : "unknown error";
        setError("Couldn't save your changes locally (" + reason + ").");
      }
    }, [shows, episodesCache, loaded]);

    useEffect(function () {
      if (!debouncedQuery.trim()) { setSearchResults([]); return; }
      var cancelled = false;
      setSearching(true);
      fetch(TVMAZE + "/search/shows?q=" + encodeURIComponent(debouncedQuery))
        .then(function (r) { return r.json(); })
        .then(function (data) { if (!cancelled) { setSearchResults(data.slice(0, 8)); setError(null); } })
        .catch(function () { if (!cancelled) setError("Couldn't reach the show database. Check your connection."); })
        .finally(function () { if (!cancelled) setSearching(false); });
      return function () { cancelled = true; };
    }, [debouncedQuery]);

    function addShow(result) {
      var s = result.show;
      if (shows.some(function (sh) { return sh.tvmazeId === s.id; })) { setSearchOpen(false); setQuery(""); return; }
      var newShow = {
        id: s.id + "-" + Date.now(),
        tvmazeId: s.id,
        name: s.name,
        image: s.image ? s.image.medium : null,
        network: (s.network && s.network.name) || (s.webChannel && s.webChannel.name) || "Unknown",
        status: "havent_watched",
        showStatus: s.status || null,
        lastSeenEpisodeId: null,
        nextAirdate: null,
        lastAirdate: null,
        hasNew: false,
        watchedEpisodeIds: []
      };
      setShows(function (prev) { return [newShow].concat(prev); });
      setSearchOpen(false); setQuery(""); setSearchResults([]);
      refreshOne(newShow);
    }

    function refreshOne(show) {
      fetch(TVMAZE + "/shows/" + show.tvmazeId + "?embed[]=previousepisode&embed[]=nextepisode")
        .then(function (res) { return res.json(); })
        .then(function (data) {
          var prevEp = data._embedded && data._embedded.previousepisode;
          var nextEp = data._embedded && data._embedded.nextepisode;
          setShows(function (prev) {
            return prev.map(function (sh) {
              if (sh.tvmazeId !== show.tvmazeId) return sh;
              var newEpAired = prevEp && sh.lastSeenEpisodeId && prevEp.id !== sh.lastSeenEpisodeId;
              var firstCheck = prevEp && sh.lastSeenEpisodeId === null;
              var isNew = firstCheck ? false : !!newEpAired;
              var nextStatus = sh.status;
              if (isNew && sh.status !== "watch_later" && sh.status !== "stopped_watching" && sh.status !== "havent_watched") {
                nextStatus = "watching";
              }
              return Object.assign({}, sh, {
                lastAirdate: (prevEp && prevEp.airdate) || null,
                nextAirdate: (nextEp && nextEp.airdate) || null,
                showStatus: data.status || sh.showStatus,
                hasNew: isNew,
                status: nextStatus,
                lastSeenEpisodeId: prevEp ? prevEp.id : sh.lastSeenEpisodeId
              });
            });
          });
        })
        .catch(function () {});
    }

    function exportData() {
      try {
        var payload = { app: "Queue", exportedAt: new Date().toISOString(), shows: shows, episodesCache: episodesCache };
        var blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
        var url = URL.createObjectURL(blob);
        var a = document.createElement("a");
        var dateStr = new Date().toISOString().slice(0, 10);
        a.href = url;
        a.download = "queue-backup-" + dateStr + ".json";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      } catch (e) {
        setError("Couldn't create the backup file.");
      }
    }

    function triggerImport() {
      if (fileInputRef.current) fileInputRef.current.click();
    }

    function handleImportFile(e) {
      var file = e.target.files && e.target.files[0];
      e.target.value = "";
      if (!file) return;
      var reader = new FileReader();
      reader.onload = function (evt) {
        try {
          var parsed = JSON.parse(evt.target.result);
          var incomingShows = Array.isArray(parsed) ? parsed : parsed.shows;
          var incomingCache = trimEpisodesCache(parsed.episodesCache || {});
          
          if (!Array.isArray(incomingShows)) throw new Error("bad format");
          var proceed = shows.length === 0 || window.confirm(
            "This will replace your current list (" + shows.length + " shows) with the " + incomingShows.length + " shows from this backup. Continue?"
          );
          if (!proceed) return;
          
          setShows(incomingShows);
          setEpisodesCache(incomingCache);
          setError(null);
        } catch (err) {
          setError("That file doesn't look like a valid Queue backup.");
        }
      };
      reader.onerror = function () { setError("Couldn't read that file."); };
      reader.readAsText(file);
    }

    function refreshAll() {
      setRefreshing(true); setError(null);
      Promise.all(shows.map(function (s) { return refreshOne(s); }))
        .finally(function () { setRefreshing(false); });
    }

    function openDetail(show) {
      setDetailShowId(show.id);
      setExpandedSeasons({});
      if (episodesCache[show.tvmazeId]) return;
      setEpisodesLoading(true);
      fetch(TVMAZE + "/shows/" + show.tvmazeId + "/episodes")
        .then(function (r) { return r.json(); })
        .then(function (eps) {
          setEpisodesCache(function (prev) {
            var next = Object.assign({}, prev);
            next[show.tvmazeId] = eps.map(trimEpisode);
            return next;
          });
        })
        .catch(function () { setError("Couldn't load episodes for this show."); })
        .finally(function () { setEpisodesLoading(false); });
    }

    function closeDetail() { setDetailShowId(null); }

    function toggleEpisodeWatched(showId, episodeId) {
      setShows(function (prev) {
        return prev.map(function (s) {
          if (s.id !== showId) return s;
          var watched = s.watchedEpisodeIds || [];
          var isWatched = watched.indexOf(episodeId) !== -1;
          var nextWatched = isWatched ? watched.filter(function (id) { return id !== episodeId; }) : watched.concat([episodeId]);
          var eps = episodesCache[s.tvmazeId];
          var nextStatus = deriveAutoStatus(s, nextWatched, eps);
          var clearsNew = nextStatus === "up_to_date" || nextStatus === "finished";
          return Object.assign({}, s, { watchedEpisodeIds: nextWatched, status: nextStatus, hasNew: clearsNew ? false : s.hasNew });
        });
      });
    }

    function markEpisodesWatched(showId, episodeIds, watched) {
      setShows(function (prev) {
        return prev.map(function (s) {
          if (s.id !== showId) return s;
          var current = s.watchedEpisodeIds || [];
          var nextWatched;
          if (watched) {
            var toAdd = episodeIds.filter(function (id) { return current.indexOf(id) === -1; });
            nextWatched = current.concat(toAdd);
          } else {
            nextWatched = current.filter(function (id) { return episodeIds.indexOf(id) === -1; });
          }
          var eps = episodesCache[s.tvmazeId];
          var nextStatus = deriveAutoStatus(s, nextWatched, eps);
          var clearsNew = nextStatus === "up_to_date" || nextStatus === "finished";
          return Object.assign({}, s, { watchedEpisodeIds: nextWatched, status: nextStatus, hasNew: clearsNew ? false : s.hasNew });
        });
      });
    }

    function toggleSeasonExpanded(seasonNum) {
      setExpandedSeasons(function (prev) {
        var next = Object.assign({}, prev);
        next[seasonNum] = !next[seasonNum];
        return next;
      });
    }

    function setStatus(showId, status) {
      setShows(function (prev) {
        return prev.map(function (s) { return s.id === showId ? Object.assign({}, s, { status: status }) : s; });
      });
      setMenuOpenFor(null);
    }
    function dismissNew(showId) {
      setShows(function (prev) { return prev.map(function (s) { return s.id === showId ? Object.assign({}, s, { hasNew: false }) : s; }); });
    }
    function removeShow(showId) {
      setShows(function (prev) { return prev.filter(function (s) { return s.id !== showId; }); });
      setMenuOpenFor(null);
    }

    var newCount = shows.filter(function (s) { return s.hasNew; }).length;
    var activeCat = CATEGORIES.filter(function (c) { return c.key === activeTab; })[0];
    var visibleShows = shows.filter(function (s) { return s.status === activeTab; });
    var countsByCategory = {};
    var newByCategory = {};
    CATEGORIES.forEach(function (c) {
      countsByCategory[c.key] = shows.filter(function (s) { return s.status === c.key; }).length;
      newByCategory[c.key] = shows.some(function (s) { return s.status === c.key && s.hasNew; });
    });

    var headerLeft = h("div", { style: styles.headerLeft },
      h("div", { style: styles.logoMark },
        h("svg", { width: 18, height: 18, viewBox: "0 0 24 24", fill: "none", stroke: "#14161C", strokeWidth: "2" },
          h("rect", { x: 3, y: 6, width: 18, height: 13, rx: 2 }),
          h("path", { d: "M8 3l4 3 4-3" })
        )
      ),
      h("div", null,
        h("div", { style: styles.logoTitle }, "QUEUE"),
        h("div", { style: styles.logoSub }, "What's Next?")
      )
    );

    var headerRight = h("div", { style: styles.headerRight },
      newCount > 0 ? h("div", { style: styles.onAirBadge }, h("span", { style: styles.onAirDot }), newCount + " NOW AIRING") : null,
      h("input", { ref: fileInputRef, type: "file", accept: "application/json", style: { display: "none" }, onChange: handleImportFile }),
      h("button", { onClick: triggerImport, style: styles.iconButton, title: "Import backup" }, Icons.upload()),
      h("button", { onClick: exportData, disabled: shows.length === 0, style: styles.iconButton, title: "Export backup" }, Icons.download()),
      h("button", {
        onClick: refreshAll, disabled: refreshing || shows.length === 0, style: styles.iconButton, title: "Check for new episodes"
      }, h("span", { style: { display: "flex", animation: refreshing ? "spin 1s linear infinite" : "none" } }, Icons.refresh())),
      h("button", { onClick: function () { setSearchOpen(true); }, style: styles.addButton }, Icons.plus(), "Add Show")
    );

    var errorBanner = error ? h("div", { style: styles.errorBanner }, error,
      h("button", { onClick: function () { setError(null); }, style: styles.errorDismiss }, Icons.x(14))
    ) : null;

    var dial = h("nav", { style: styles.dial },
      CATEGORIES.map(function (c) {
        var activeStyle = activeTab === c.key ? Object.assign({}, styles.dialButtonActive, { boxShadow: "0 0 0 1.5px " + c.color + " inset" }) : {};
        return h("button", {
          key: c.key, onClick: function () { setActiveTab(c.key); },
          style: Object.assign({}, styles.dialButton, activeStyle)
        },
          h("div", { style: styles.dialLabelRow },
            h("span", { style: Object.assign({}, styles.dialDot, { background: c.color }) }),
            h("span", { style: styles.dialLabel }, c.label)
          ),
          h("span", { style: styles.dialCount }, countsByCategory[c.key]),
          newByCategory[c.key] ? h("span", { style: Object.assign({}, styles.dialLight, { background: "#FF4B3E" }) }) : null
        );
      })
    );

    var mainContent;
    if (!loaded) {
      mainContent = h("div", { style: styles.emptyState }, "Tuning in…");
    } else if (visibleShows.length === 0) {
      mainContent = h("div", { style: styles.emptyState },
        Icons.tv(28),
        h("div", { style: styles.emptyTitle }, "Nothing on " + activeCat.label),
        h("div", { style: styles.emptySub }, shows.length === 0 ? "Add your first show to start tracking." : "Move a show here, or add a new one.")
      );
    } else {
      mainContent = h("div", { style: styles.grid },
        visibleShows.map(function (show) {
          var menu = menuOpenFor === show.id ? h("div", { style: styles.menu },
            CATEGORIES.filter(function (c) { return c.key === "watching" || c.key === "havent_watched" || c.key === "watch_later" || c.key === "stopped_watching"; }).map(function (c) {
              return h("button", { key: c.key, style: styles.menuItem, onClick: function () { setStatus(show.id, c.key); } },
                h("span", { style: Object.assign({}, styles.dialDot, { background: c.color }) }),
                c.label,
                show.status === c.key ? h("span", { style: { marginLeft: "auto", display: "flex" } }, Icons.check()) : null
              );
            }),
            h("button", { style: Object.assign({}, styles.menuItem, { color: "#FF4B3E", borderTop: "1px solid #2A2E3A" }), onClick: function () { removeShow(show.id); } }, "Remove show")
          ) : null;

          return h("div", { key: show.id, style: styles.card },
            show.hasNew ? h("div", { style: styles.newBadge, onClick: function () { dismissNew(show.id); }, title: "Mark as seen" }, h("span", { style: styles.onAirDot }), "NEW EPISODE") : null,
            h("div", { style: styles.cardTop },
              show.image ? h("img", { src: show.image, alt: show.name, style: styles.poster }) : h("div", { style: styles.posterFallback }, Icons.tv(20)),
              h("div", { style: styles.cardInfo },
                h("div", { style: styles.showName }, show.name),
                h("div", { style: styles.showNetwork }, show.network),
                show.nextAirdate ? h("div", { style: styles.airdate }, "Next: " + fmtDate(show.nextAirdate)) : null,
                (!show.nextAirdate && show.lastAirdate) ? h("div", { style: styles.airdateMuted }, "Last aired " + fmtDate(show.lastAirdate)) : null,
                (function () {
                  var eps = episodesCache[show.tvmazeId];
                  if (!eps) return null;
                  var today = new Date().toISOString().slice(0, 10);
                  var aired = eps.filter(function (e) { return e.airdate && e.airdate <= today; });
                  var watchedSet = show.watchedEpisodeIds || [];
                  var watchedCount = aired.filter(function (e) { return watchedSet.indexOf(e.id) !== -1; }).length;
                  var pct = aired.length ? Math.round((watchedCount / aired.length) * 100) : 0;
                  return h("div", null,
                    h("div", { style: styles.progressBar }, h("div", { style: Object.assign({}, styles.progressFill, { width: pct + "%" }) })),
                    h("div", { style: { fontFamily: "'JetBrains Mono', monospace", fontSize: 10, color: "#5A5F73", marginTop: 3 } }, watchedCount + "/" + aired.length + " episodes")
                  );
                })()
              )
            ),
            h("div", { style: Object.assign({}, styles.cardFooter, { justifyContent: "space-between" }) },
              h("button", { style: styles.episodesButton, onClick: function () { openDetail(show); } }, "Episodes"),
              h("div", { style: { position: "relative" } },
                h("button", { style: styles.moveButton, onClick: function () { setMenuOpenFor(menuOpenFor === show.id ? null : show.id); } }, "Move", Icons.chevron()),
                menu
              )
            )
          );
        })
      );
    }

    var modal = searchOpen ? h("div", { style: styles.modalBackdrop, onClick: function () { setSearchOpen(false); } },
      h("div", { style: styles.modal, onClick: function (e) { e.stopPropagation(); } },
        h("div", { style: styles.modalHeader },
          Icons.search(),
          h("input", {
            autoFocus: true, value: query, onChange: function (e) { setQuery(e.target.value); },
            placeholder: "Search any show, from anywhere…", style: styles.searchInput
          }),
          h("button", { onClick: function () { setSearchOpen(false); }, style: styles.iconButtonPlain }, Icons.x(18))
        ),
        h("div", { style: styles.resultsList },
          searching ? h("div", { style: styles.emptySub }, "Searching…") : null,
          (!searching && debouncedQuery && searchResults.length === 0) ? h("div", { style: styles.emptySub }, "No shows found.") : null,
          searchResults.map(function (r) {
            var already = shows.some(function (sh) { return sh.tvmazeId === r.show.id; });
            return h("button", {
              key: r.show.id, onClick: function () { addShow(r); }, disabled: already,
              style: Object.assign({}, styles.resultRow, { opacity: already ? 0.5 : 1 })
            },
              r.show.image ? h("img", { src: r.show.image.medium, alt: "", style: styles.resultThumb }) : h("div", { style: styles.resultThumbFallback }, Icons.tv(16)),
              h("div", { style: { textAlign: "left", flex: 1 } },
                h("div", { style: styles.resultName }, r.show.name),
                h("div", { style: styles.resultMeta }, (r.show.premiered ? r.show.premiered.slice(0, 4) : "—") + " · " + ((r.show.network && r.show.network.name) || (r.show.webChannel && r.show.webChannel.name) || "Unknown network"))
              ),
              already ? h("span", { style: styles.alreadyTag }, "Added") : h("span", { style: { color: "#4FD1C5", display: "flex" } }, Icons.plus())
            );
          })
        )
      )
    ) : null;

    var detailShow = detailShowId ? shows.filter(function (s) { return s.id === detailShowId; })[0] : null;
    var detailModal = null;
    if (detailShow) {
      var eps = episodesCache[detailShow.tvmazeId];
      var today = new Date().toISOString().slice(0, 10);
      var watchedSet = detailShow.watchedEpisodeIds || [];
      var seasonsBody;
      if (episodesLoading && !eps) {
        seasonsBody = h("div", { style: styles.emptySub }, "Loading episodes…");
      } else if (!eps || eps.length === 0) {
        seasonsBody = h("div", { style: styles.emptySub }, "No episode data found for this show.");
      } else {
        var bySeasonMap = {};
        eps.forEach(function (e) {
          var sn = e.season;
          if (!bySeasonMap[sn]) bySeasonMap[sn] = [];
          bySeasonMap[sn].push(e);
        });
        var seasonNums = Object.keys(bySeasonMap).map(Number).sort(function (a, b) { return b - a; });
        seasonsBody = seasonNums.map(function (sn) {
          var seasonEps = bySeasonMap[sn];
          var aired = seasonEps.filter(function (e) { return e.airdate && e.airdate <= today; });
          var watchedCount = aired.filter(function (e) { return watchedSet.indexOf(e.id) !== -1; }).length;
          var isExpanded = !!expandedSeasons[sn];
          var rows = isExpanded ? seasonEps.map(function (e) {
            var isWatched = watchedSet.indexOf(e.id) !== -1;
            var hasAired = e.airdate && e.airdate <= today;
            return h("label", { key: e.id, style: Object.assign({}, styles.episodeRow, { opacity: hasAired ? 1 : 0.45 }) },
              h("input", {
                type: "checkbox", checked: isWatched, disabled: !hasAired, style: styles.episodeCheckbox,
                onChange: function () { toggleEpisodeWatched(detailShow.id, e.id); }
              }),
              h("span", { style: styles.episodeNum }, "E" + e.number),
              h("span", { style: styles.episodeName }, e.name || "Untitled"),
              h("span", { style: styles.episodeDate }, hasAired ? fmtDate(e.airdate) : (e.airdate ? fmtDate(e.airdate) : "TBA"))
            );
          }) : null;
          return h("div", { key: sn },
            h("div", { style: styles.seasonHeader },
              h("div", { style: styles.seasonTitle, onClick: function () { toggleSeasonExpanded(sn); } },
                h("span", { style: { display: "flex", transform: isExpanded ? "none" : "rotate(-90deg)", transition: "transform 0.15s" } }, Icons.chevron()),
                "Season " + sn
              ),
              h("div", { style: { display: "flex", alignItems: "center", gap: 10 } },
                h("span", { style: styles.seasonProgress }, watchedCount + "/" + aired.length),
                h("button", {
                  style: styles.seasonMarkAll,
                  onClick: function () { markEpisodesWatched(detailShow.id, aired.map(function (e) { return e.id; }), watchedCount < aired.length); }
                }, watchedCount < aired.length ? "Mark all" : "Unmark all")
              )
            ),
            rows
          );
        });
      }

      var allAired = eps ? eps.filter(function (e) { return e.airdate && e.airdate <= today; }) : [];
      var allAiredIds = allAired.map(function (e) { return e.id; });
      var allWatchedCount = allAired.filter(function (e) { return watchedSet.indexOf(e.id) !== -1; }).length;
      var isAllWatched = allAired.length > 0 && allWatchedCount === allAired.length;

      detailModal = h("div", { style: styles.detailBackdrop, onClick: closeDetail },
        h("div", { style: styles.detailPanel, onClick: function (e) { e.stopPropagation(); } },
          h("div", { style: styles.detailHeader },
            detailShow.image ? h("img", { src: detailShow.image, alt: "", style: { width: 44, height: 62, borderRadius: 5, objectFit: "cover", flexShrink: 0 } }) : null,
            h("div", { style: { flex: 1, minWidth: 0 } },
              h("div", { style: styles.detailTitle }, detailShow.name),
              h("div", { style: styles.detailSub }, detailShow.network),
              eps ? h("button", {
                style: Object.assign({}, styles.seasonMarkAll, { marginTop: 8 }),
                onClick: function () { markEpisodesWatched(detailShow.id, allAiredIds, !isAllWatched); }
              }, isAllWatched ? "Unmark all aired episodes" : "Mark all aired episodes") : null
            ),
            h("button", { onClick: closeDetail, style: styles.iconButtonPlain }, Icons.x(18))
          ),
          h("div", { style: styles.detailBody }, seasonsBody)
        )
      );
    }

    return h("div", { style: styles.page },
      h("div", { style: styles.scanlines }),
      h("header", { style: styles.header }, headerLeft, headerRight),
      errorBanner,
      dial,
      h("main", { style: styles.main }, mainContent),
      modal,
      detailModal
    );
  }

  var styles = {

    errorBanner: { margin: "0 24px 12px", background: "rgba(255,75,62,0.1)", border: "1px solid rgba(255,75,62,0.35)", color: "#FF9A90", borderRadius: 8, padding: "10px 14px", fontSize: 13, display: "flex", justifyContent: "space-between", alignItems: "center", gap: 10, position: "relative", zIndex: 1 },

    dialButtonActive: { background: "#20232E", color: "#EDEAE2" },

    resultThumb: { width: 34, height: 46, borderRadius: 4, objectFit: "cover", flexShrink: 0 },

  };

  var root = ReactDOM.createRoot(document.getElementById("root"));
  root.render(h(App));
})();
